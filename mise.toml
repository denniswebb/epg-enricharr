[env]

[tasks.help]
description = "List all available tasks"
run = """
echo "epg-enricharr Local Development Tasks"
echo "======================================"
echo ""
echo "setup:"
echo "  mise run dev-setup             Install development dependencies"
echo "  mise run setup-dispatcharr     Set up local Dispatcharr instance (Docker)"
echo ""
echo "building:"
echo "  mise run test-zip              Generate plugin zip package"
echo "  mise run clean                 Remove build artifacts"
echo ""
echo "testing:"
echo "  mise run validate              Validate plugin zip structure and tests"
echo "  mise run install-plugin        Install plugin to local Dispatcharr"
echo "  mise run check-output          Verify enrichment output on test EPG data"
echo ""
echo "usage:"
echo "  mise run help                  Show this help message"
"""

[tasks.dev-setup]
description = "Install development dependencies"
run = """
echo "Installing development dependencies..."
./dev-setup.sh
echo "✅ Development environment ready"
"""

[tasks.clean]
description = "Remove build artifacts"
run = """
echo "Cleaning build artifacts..."
rm -rf ./build epg-enricharr-1.0.0.zip epg-enricharr-2.0.0.zip
echo "✅ Clean complete"
"""

[tasks.test-zip]
description = "Generate plugin zip package"
depends = ["clean"]
run = """
VERSION=2.0.0
PLUGIN_NAME=epg-enricharr
BUILD_DIR=./build

echo "Building plugin zip..."
mkdir -p "$BUILD_DIR/$PLUGIN_NAME-$VERSION"
cp plugin.json "$BUILD_DIR/$PLUGIN_NAME-$VERSION/"
cp plugin.py "$BUILD_DIR/$PLUGIN_NAME-$VERSION/"
cp README.md "$BUILD_DIR/$PLUGIN_NAME-$VERSION/"
cp LICENSE "$BUILD_DIR/$PLUGIN_NAME-$VERSION/" 2>/dev/null || echo "No LICENSE file"
mkdir -p "$BUILD_DIR/$PLUGIN_NAME-$VERSION/tests"
cp tests/test_enrichment.py "$BUILD_DIR/$PLUGIN_NAME-$VERSION/tests/" 2>/dev/null || echo "No test file"
mkdir -p "$BUILD_DIR/$PLUGIN_NAME-$VERSION/tests/fixtures"
cp tests/fixtures/*.xml "$BUILD_DIR/$PLUGIN_NAME-$VERSION/tests/fixtures/" 2>/dev/null || echo "No fixture files"
cd "$BUILD_DIR" && zip -r ../"$PLUGIN_NAME-$VERSION.zip" "$PLUGIN_NAME-$VERSION" > /dev/null
echo "✅ Plugin zip created: $PLUGIN_NAME-$VERSION.zip"
"""

[tasks.validate]
description = "Validate plugin zip structure and tests"
run = """
echo "Validating plugin..."
python3 validation.py epg-enricharr-2.0.0.zip
"""

[tasks.setup-dispatcharr]
description = "Set up local Dispatcharr instance (Docker)"
run = """
echo "Setting up local Dispatcharr instance..."
if command -v docker &> /dev/null; then
    docker run -d --name dispatcharr-dev \
        -p 8000:8000 \
        -v "$(pwd)/tests/fixtures:/app/data/fixtures" \
        -e DEBUG=True \
        --rm \
        python:3.11 \
        bash -c "pip install django && python -m django startproject dispatcharr /app && python /app/manage.py runserver 0.0.0.0:8000" \
        2>/dev/null || docker start dispatcharr-dev
    echo "✅ Dispatcharr available at http://localhost:8000"
else
    echo "⚠️  Docker not found. Use dev-setup.sh to set up Python environment instead."
    echo "See docs/SETUP.md for native installation steps."
fi
"""

[tasks.install-plugin]
description = "Install plugin to local Dispatcharr"
depends = ["test-zip"]
run = """
DISPATCHARR_PLUGIN_DIR="${DISPATCHARR_PLUGIN_DIR:=$HOME/.dispatcharr/plugins}"
ZIP_FILE="epg-enricharr-1.0.0.zip"

echo "Installing plugin to local Dispatcharr..."
if [ -d "$DISPATCHARR_PLUGIN_DIR" ]; then
    mkdir -p "$DISPATCHARR_PLUGIN_DIR"
    unzip -q -o "$ZIP_FILE" -d "$DISPATCHARR_PLUGIN_DIR"
    echo "✅ Plugin installed to $DISPATCHARR_PLUGIN_DIR"
else
    echo "⚠️  Dispatcharr plugin directory not found: $DISPATCHARR_PLUGIN_DIR"
    echo "Set DISPATCHARR_PLUGIN_DIR or ensure Dispatcharr is installed."
    exit 1
fi
"""

[tasks.check-output]
description = "Verify enrichment output on test EPG data"
run = """
echo "Checking enrichment output..."
if [ -f tests/fixtures/sample-epg.xml ]; then
    python3 scripts/validate_output.py tests/fixtures/sample-epg.xml
else
    echo "⚠️  No test EPG data found. Run 'mise run test-zip' first."
fi
"""

[tasks.deploy-plugin]
description = "Deploy plugin to remote Dispatcharr instance"
depends = ["test-zip"]
run = """
./scripts/deploy.sh
"""
